<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Setup — eLeague Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#F8F9FA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:16px;padding:2rem;max-width:400px;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.1);text-align:center}
    .logo{width:64px;height:64px;background:#1D9E75;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.5rem}
    h1{font-size:1.2rem;margin-bottom:.5rem}
    p{font-size:.88rem;color:#666;margin-bottom:1.5rem;line-height:1.6}
    .btn{width:100%;padding:.75rem;border:none;border-radius:10px;font-size:.95rem;font-family:'Inter',sans-serif;cursor:pointer;font-weight:600;transition:all .15s}
    .btn-primary{background:#1D9E75;color:#fff}
    .btn-primary:hover{background:#0F6E56}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .status{margin-top:1rem;padding:.75rem;border-radius:8px;font-size:.85rem;display:none}
    .status.success{background:#E1F5EE;color:#0F6E56;display:block}
    .status.error{background:#FCEBEB;color:#D93025;display:block}
    .warning{background:#FEF7E0;border-radius:8px;padding:.75rem;font-size:.82rem;color:#854F0B;margin-bottom:1.5rem;text-align:left}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚙️</div>
  <h1>First-time Admin Setup</h1>
  <p>This page seeds your Google account as the first admin. Only run this once!</p>
  <div class="warning">⚠️ After setup is complete, delete this file from GitHub for security.</div>
  <button class="btn btn-primary" id="setup-btn">Sign in with Google & Set as Admin</button>
  <div class="status" id="status"></div>
</div>

<script type="module">
  import { auth, db } from './js/firebase.js';
  import { GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  document.getElementById('setup-btn').addEventListener('click', async () => {
    const btn = document.getElementById('setup-btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    btn.textContent = 'Setting up...';
    status.className = 'status';

    try {
      const provider = new GoogleAuthProvider();
      const result = await signInWithPopup(auth, provider);
      const email = result.user.email;

      // Check if admins already exist
      const snap = await getDocs(collection(db, 'admins'));
      if (!snap.empty) {
        status.className = 'status error';
        status.textContent = 'Admins already exist! Use the admin panel to manage admins.';
        btn.disabled = false;
        btn.textContent = 'Sign in with Google & Set as Admin';
        return;
      }

      // Add as first admin
      const id = email.replace(/[^a-z0-9]/g, '_');
      await setDoc(doc(db, 'admins', id), {
        email,
        addedAt: new Date().toISOString(),
        isSuper: true
      });

      status.className = 'status success';
      status.innerHTML = `✅ <strong>${email}</strong> is now admin!<br><br>You can now go to <a href="admin.html" style="color:#1D9E75">admin.html</a> and manage other admins from there.<br><br><strong>Remember to delete this file from GitHub!</strong>`;
      btn.textContent = 'Done!';
    } catch(e) {
      status.className = 'status error';
      status.textContent = 'Error: ' + (e.message || 'Setup failed');
      btn.disabled = false;
      btn.textContent = 'Sign in with Google & Set as Admin';
    }
  });
</script>
</body>
</html>
