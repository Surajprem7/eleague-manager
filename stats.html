<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#21F1A8" />
  <meta name="description" content="eLeague Manager — Player Stats" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Stats — eLeague Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .stat-hero {
      background: linear-gradient(135deg, #21F1A8, #0DB87E);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      color: #fff;
      margin-bottom: 1rem;
      text-align: center;
    }
    .stat-hero .avatar {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700;
      margin: 0 auto 0.75rem;
      color: #fff;
    }
    .stat-hero h2 { color: #fff; font-size: 1.2rem; margin-bottom: 2px; }
    .stat-hero p  { opacity: 0.8; font-size: 0.82rem; }
    .stat-grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }
    .mini-stat {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 0.75rem 0.5rem;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .mini-stat .num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gray-900);
    }
    .mini-stat .lbl {
      font-size: 0.68rem;
      color: var(--gray-600);
      margin-top: 2px;
    }
    .result-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
      flex-shrink: 0;
    }
    .result-W { background: var(--green-light); color: var(--green-dark); }
    .result-D { background: var(--gray-100);    color: var(--gray-600); }
    .result-L { background: var(--red-light);   color: var(--red); }
    .win-bar-wrap {
      height: 8px;
      background: var(--gray-100);
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0 2px;
    }
    .win-bar { height: 100%; background: #21F1A8; border-radius: 4px; transition: width 0.6s ease; }
    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--gray-100);
    }
    .leaderboard-row:last-child { border-bottom: none; }
    .lb-rank {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700;
      flex-shrink: 0;
    }
    .rank-1 { background: #FFD700; color: #7A5700; }
    .rank-2 { background: #C0C0C0; color: #444; }
    .rank-3 { background: #CD7F32; color: #fff; }
    .rank-n { background: var(--gray-100); color: var(--gray-600); }
    .lb-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .lb-goals { font-size: 1rem; font-weight: 700; color: #0DB87E; }
    .lb-played { font-size: 0.75rem; color: var(--gray-600); }
    .tab-row {
      display: flex; gap: 4px;
      background: var(--gray-100);
      padding: 4px;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
    }
    .stab {
      flex: 1; padding: 7px;
      border: none; background: transparent;
      border-radius: 6px; font-size: 13px;
      cursor: pointer; color: var(--gray-600);
      font-family: var(--font); transition: all 0.15s;
    }
    .stab.active {
      background: var(--white);
      color: var(--gray-900);
      font-weight: 500;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: #0DB87E; font-size: 0.85rem;
      font-weight: 500; text-decoration: none;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<div id="splash">
  <span class="splash-icon">⚽</span>
  <h1>eLeague Manager</h1>
  <p>Loading stats...</p>
</div>

<div class="offline-banner" id="offline-banner">⚡ You're offline — showing cached data</div>

<header class="app-header">
  <div class="container">
    <div class="logo">⚽</div>
    <div>
      <h1>eLeague Manager</h1>
      <p>Player Stats & Leaderboard</p>
    </div>
  </div>
</header>

<main class="page">
  <div class="container">

    <a href="index.html" class="back-btn">← Back to Tournament</a>

    <div class="tab-row">
      <button class="stab active" onclick="showTab('search',this)">🔍 Player Stats</button>
      <button class="stab" onclick="showTab('leaderboard',this)">🏆 Leaderboard</button>
    </div>

    <!-- SEARCH TAB -->
    <div id="tab-search">
      <div class="card" style="margin-bottom:0.75rem">
        <div class="card-title">Find a player</div>
        <div style="display:flex;gap:8px">
          <input type="text" class="form-input" id="stats-search" placeholder="Enter player name" style="flex:1" />
          <button class="btn btn-primary" id="stats-search-btn">Search</button>
        </div>
      </div>
      <div id="stats-result">
        <div class="empty-state">
          <span class="icon">📊</span>
          <p>Search a player name to see their stats</p>
        </div>
      </div>
    </div>

    <!-- LEADERBOARD TAB -->
    <div id="tab-leaderboard" style="display:none">
      <div id="leaderboard-content">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
  import { db } from './js/firebase.js';
  import { getPlayerStats, getTopScorers } from './js/stats.js';
  import {
    collection, getDocs, query, where
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1000);
  });

  window.addEventListener('offline', () => document.getElementById('offline-banner').classList.add('show'));
  window.addEventListener('online',  () => document.getElementById('offline-banner').classList.remove('show'));

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Tab switching
  window.showTab = (tab, btn) => {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-search').style.display      = tab==='search'      ? 'block' : 'none';
    document.getElementById('tab-leaderboard').style.display = tab==='leaderboard' ? 'block' : 'none';
    if (tab === 'leaderboard') loadLeaderboard();
  };

  // ── PLAYER STATS ──
  document.getElementById('stats-search-btn').addEventListener('click', async () => {
    const name = document.getElementById('stats-search').value.trim();
    if (!name) { toast('Enter a player name'); return; }
    const el = document.getElementById('stats-result');
    el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

    try {
      const snap = await getDocs(query(collection(db, 'players'), where('name', '==', name)));
      if (snap.empty) {
        el.innerHTML = '<div class="empty-state"><span class="icon">🔍</span><p>Player not found.</p></div>';
        return;
      }
      const player = { id: snap.docs[0].id, ...snap.docs[0].data() };
      const stats = await getPlayerStats(player.id);

      const resultColors = { W:'#0DB87E', D:'#888', L:'#D93025' };

      el.innerHTML = `
        <div class="stat-hero">
          <div class="avatar">${player.name[0].toUpperCase()}</div>
          <h2>${esc(player.name)}</h2>
          <p>⚽ ${esc(player.efootballId)}${player.group ? ' · Group ' + player.group : ''}</p>
          ${stats.knockoutReached ? `<p style="margin-top:4px;font-size:0.8rem;background:rgba(255,255,255,0.15);display:inline-block;padding:2px 10px;border-radius:99px">Reached: ${stats.knockoutReached}</p>` : ''}
        </div>

        <div class="stat-grid-4">
          <div class="mini-stat"><div class="num">${stats.played}</div><div class="lbl">Played</div></div>
          <div class="mini-stat"><div class="num" style="color:#0DB87E">${stats.w}</div><div class="lbl">Won</div></div>
          <div class="mini-stat"><div class="num" style="color:#888">${stats.d}</div><div class="lbl">Drawn</div></div>
          <div class="mini-stat"><div class="num" style="color:#D93025">${stats.l}</div><div class="lbl">Lost</div></div>
        </div>

        <div class="card" style="margin-bottom:0.75rem">
          <div class="card-title">Goals</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
            <div><div style="font-size:1.4rem;font-weight:700;color:#0DB87E">${stats.gf}</div><div style="font-size:0.72rem;color:var(--gray-600)">Scored</div></div>
            <div><div style="font-size:1.4rem;font-weight:700;color:#D93025">${stats.ga}</div><div style="font-size:0.72rem;color:var(--gray-600)">Conceded</div></div>
            <div><div style="font-size:1.4rem;font-weight:700;color:${stats.gd>=0?'#0DB87E':'#D93025'}">${stats.gd>0?'+':''}${stats.gd}</div><div style="font-size:0.72rem;color:var(--gray-600)">Difference</div></div>
          </div>
          <div style="margin-top:1rem">
            <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--gray-600)">
              <span>Win rate</span><span>${stats.winRate}%</span>
            </div>
            <div class="win-bar-wrap"><div class="win-bar" style="width:${stats.winRate}%"></div></div>
          </div>
        </div>

        ${stats.history.length ? `
        <div class="card">
          <div class="card-title">Match history</div>
          ${stats.history.map(m => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--gray-100)">
              <div class="result-badge result-${m.result}">${m.result}</div>
              <div style="flex:1">
                <div style="font-size:0.88rem;font-weight:500">vs ${esc(m.opponent)}</div>
                <div style="font-size:0.72rem;color:var(--gray-600)">${m.phase}${m.group?' · Group '+m.group:''}</div>
              </div>
              <div style="font-size:1rem;font-weight:700;color:${m.result==='W'?'#21F1A8':m.result==='L'?'#D93025':'#888'}">${m.myScore} – ${m.oppScore}</div>
            </div>`).join('')}
        </div>` : ''}`;
    } catch(e) {
      el.innerHTML = '<div class="empty-state"><span class="icon">⚠️</span><p>Error loading stats.</p></div>';
      console.error(e);
    }
  });

  // ── LEADERBOARD ──
  let leaderboardLoaded = false;
  async function loadLeaderboard() {
    if (leaderboardLoaded) return;
    leaderboardLoaded = true;
    const el = document.getElementById('leaderboard-content');
    try {
      const scorers = await getTopScorers();
      if (!scorers.length) {
        el.innerHTML = '<div class="empty-state"><span class="icon">🏆</span><p>Leaderboard will appear after matches are played.</p></div>';
        return;
      }
      el.innerHTML = `
        <div class="card" style="margin-bottom:0.75rem">
          <div class="card-title">Top Scorers ⚽</div>
          ${scorers.slice(0,10).map((p,i) => `
            <div class="leaderboard-row">
              <div class="lb-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</div>
              <div class="lb-name">${esc(p.name)}</div>
              <div style="text-align:right">
                <div class="lb-goals">${p.goals} ⚽</div>
                <div class="lb-played">${p.played} played · ${p.wins}W</div>
              </div>
            </div>`).join('')}
        </div>

        <div class="card">
          <div class="card-title">Most Wins 🏆</div>
          ${[...scorers].sort((a,b)=>b.wins-a.wins||b.goals-a.goals).slice(0,10).map((p,i) => `
            <div class="leaderboard-row">
              <div class="lb-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}">${i+1}</div>
              <div class="lb-name">${esc(p.name)}</div>
              <div style="text-align:right">
                <div class="lb-goals" style="color:#1A73E8">${p.wins} W</div>
                <div class="lb-played">${p.played} played · ${p.goals}⚽</div>
              </div>
            </div>`).join('')}
        </div>`;
    } catch(e) {
      el.innerHTML = '<div class="empty-state"><span class="icon">⚠️</span><p>Error loading leaderboard.</p></div>';
    }
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
